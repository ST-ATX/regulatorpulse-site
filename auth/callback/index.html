<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authorizing...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f0f0f; color: #fff; }
    .box { text-align: center; max-width: 500px; padding: 2rem; }
    code { background: #222; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; word-break: break-all; display: block; margin: 1rem 0; }
    h2 { margin-bottom: 0.5rem; }
    p { color: #aaa; }
  </style>
</head>
<body>
  <div class="box">
    <h2>✅ Authorization Complete</h2>
    <p>Copy the full URL from your browser address bar and paste it into the terminal.</p>
    <p>Full callback URL:</p>
    <code id="url"></code>
  </div>
  <script>
    document.getElementById('url').textContent = window.location.href;
  </script>
</body>
</html>
